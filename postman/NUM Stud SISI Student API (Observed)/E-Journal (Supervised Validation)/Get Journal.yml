info:
  name: Get Journal
  type: http
  seq: 2

http:
  method: GET
  url: "{{teach_sisi_base}}/stud/getJournal?priv_hash={{sih}}&acid={{acid}}"
  params:
    - name: priv_hash
      value: "{{sih}}"
      type: query
    - name: acid
      value: "{{acid}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

